spring.application.name=ms-cliente
# ==========================================
# CONFIGURACIÓN DEL SERVIDOR (MICROSERVICIO)
# ==========================================
# Le asignamos el puerto 8081 a este microservicio de Clientes
server.port=8081

# ==========================================
# CONEXIÓN A BASE DE DATOS LARAGON (MYSQL)
# ==========================================
# URL apuntando a tu BD local. La llamaremos 'db_cine_cliente'
spring.datasource.url=jdbc:mysql://localhost:3306/db_cine_cliente
# El usuario por defecto de Laragon es 'root'
spring.datasource.username=root
# La contraseña por defecto de Laragon está vacía
spring.datasource.password=

# ==========================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ==========================================
# Estrategia de gestión del esquema de base de datos[cite: 4]
# Como agregamos Flyway, lo ideal es usar 'update' o 'validate'. Usaremos 'update' por ahora.
spring.jpa.hibernate.ddl-auto=update

# Muestra y formatea el código SQL generado en la consola para depuración[cite: 4]
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Especifica el dialecto exacto para que Hibernate genere el SQL adecuado[cite: 4]
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

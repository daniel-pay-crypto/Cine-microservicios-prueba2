spring.application.name=ms-cliente
server.port=8081

# createDatabaseIfNotExist=true hace que Spring cree la BD si no existe
spring.datasource.url=jdbc:mysql://127.0.0.1:3307/db_cine_cliente?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect